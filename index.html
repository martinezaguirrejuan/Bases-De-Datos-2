<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bases de Datos 2 — Proyecto Final Licorería</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d2137;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, #0d2137, #1a3a5c);
      padding: 16px 24px;
      border-bottom: 3px solid #c9a84c;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 800;
      color: #e8c76a;
    }
    header p { font-size: 0.78rem; color: rgba(255,255,255,0.5); }

    .tabs {
      display: flex;
      gap: 10px;
    }

    .tab-btn {
      background: rgba(255,255,255,0.07);
      border: 2px solid transparent;
      color: rgba(255,255,255,0.6);
      padding: 10px 22px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tab-btn:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }

    .tab-btn.active {
      background: #c9a84c;
      border-color: #c9a84c;
      color: #0d2137;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
      display: none;
    }

    iframe.active { display: block; }

    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      gap: 16px;
    }

    .welcome .icon { font-size: 4rem; }
    .welcome h2 { font-size: 1.4rem; color: #e8c76a; }
    .welcome p { color: rgba(255,255,255,0.5); font-size: 0.9rem; }
    .welcome .arrow { font-size: 2rem; color: #c9a84c; animation: bounce .8s infinite alternate; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-8px); } }

    @media (max-width: 500px) {
      .tab-btn span { display: none; }
      .tab-btn { padding: 10px 14px; }
    }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>🍾 Sistema de Licorería</h1>
      <p>Juan Fernando Martinez Aguirre · Bases de Datos II</p>
    </div>
    <div class="tabs">
      <button class="tab-btn" id="btn-mer" onclick="mostrar('mer')">
        📊 <span>MER & Diccionario</span>
      </button>
      <button class="tab-btn" id="btn-consultas" onclick="mostrar('consultas')">
        🔍 <span>Consultas</span>
      </button>
    </div>
  </header>

  <div class="welcome" id="welcome">
    <div class="icon">🍾</div>
    <h2>Proyecto Final — Licorería</h2>
    <p>Selecciona una sección con los botones de arriba</p>
    <div class="arrow">↑</div>
  </div>

  <iframe id="frame-mer" src="MER_Diccionario_Licoreria.html" title="MER y Diccionario"></iframe>
  <iframe id="frame-consultas" src="consultas_importantes.html" title="Consultas"></iframe>

  <script>
    function mostrar(cual) {
      document.getElementById('welcome').style.display = 'none';
      document.getElementById('frame-mer').classList.remove('active');
      document.getElementById('frame-consultas').classList.remove('active');
      document.getElementById('btn-mer').classList.remove('active');
      document.getElementById('btn-consultas').classList.remove('active');

      document.getElementById('frame-' + cual).classList.add('active');
      document.getElementById('btn-' + cual).classList.add('active');
    }
  </script>

</body>
</html>
